name: Docker Build

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "client/**"
      - "admin/**"
      - "docker-compose.yaml"
      - ".github/workflows/docker-build.yaml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "client/**"
      - "admin/**"
      - "docker-compose.yaml"

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: showoff-backend:latest

  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build admin Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: false
          tags: showoff-admin:latest

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: showoff-client:latest
