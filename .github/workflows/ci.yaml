name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "shop/**"
      - "admin/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "shop/**"
      - "admin/**"

jobs:
  backend-check:
    name: Backend — install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

  shop-check:
    name: Shop — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: shop/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./shop

      - name: Lint
        run: npm run lint
        working-directory: ./shop

      - name: Build
        run: npm run build
        working-directory: ./shop

  admin-check:
    name: Admin — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./admin

      - name: Lint
        run: npm run lint
        working-directory: ./admin

      - name: Build
        run: npm run build
        working-directory: ./admin
