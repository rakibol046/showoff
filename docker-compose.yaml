services:
  # Backend API Service
  backend:
    container_name: showoff-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

  # Admin Frontend (Vite)
  admin:
    container_name: showoff-admin
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

  # Client Frontend (Next.js)
  client:
    container_name: showoff-client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8080/api
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

volumes:
  backend_node_modules:
  admin_node_modules:
  client_node_modules:

networks:
  showoff-network:
    driver: bridge
