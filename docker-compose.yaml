version: "3.8"

services:
  # Backend API Service
  backend:
    container_name: showoff-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

  # Admin Frontend (Vite)
  admin:
    container_name: showoff-admin
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

  # Client Frontend (Next.js)
  client:
    container_name: showoff-client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

networks:
  showoff-network:
    driver: bridge
# End of docker-compose.yaml
