services:
  # Backend API Service
  backend:
    container_name: showoff-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

  # Admin Frontend (Vite)
  admin:
    container_name: showoff-admin
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

  # Shop Frontend (Next.js)
  shop:
    container_name: showoff-shop
    build:
      context: ./shop
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./shop/.env
    volumes:
      - ./shop:/app
      - shop_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

volumes:
  backend_node_modules:
  admin_node_modules:
  shop_node_modules:

networks:
  showoff-network:
    driver: bridge
