services:
  # Local MongoDB (no Atlas whitelist needed)
  mongo:
    image: mongo:7
    container_name: showoff-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - showoff-network
    restart: unless-stopped

  # Backend API Service
  backend:
    container_name: showoff-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Override Atlas URI — use the local mongo service inside Docker
      - MONGODB_URI=mongodb://mongo:27017/showoff
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - mongo
    networks:
      - showoff-network
    restart: unless-stopped

  # Admin Frontend (Vite)
  admin:
    container_name: showoff-admin
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

  # Shop Frontend (Next.js)
  shop:
    container_name: showoff-shop
    build:
      context: ./shop
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8080/api
    volumes:
      - ./shop:/app
      - shop_node_modules:/app/node_modules
    networks:
      - showoff-network
    restart: unless-stopped

volumes:
  mongo_data:
  backend_node_modules:
  admin_node_modules:
  shop_node_modules:

networks:
  showoff-network:
    driver: bridge
